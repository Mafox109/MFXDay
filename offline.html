<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0ea5e9" />
    <title>Offline - MFX Day</title>
    <style>
      body{
        margin:0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        background: #0f172a;
        color: #e5e7eb;
        display:flex;
        min-height:100vh;
        align-items:center;
        justify-content:center;
        padding: 16px;
      }
      .box{
        width: 100%;
        max-width: 560px;
        background: rgba(30,41,59,0.75);
        border: 1px solid rgba(148,163,184,0.18);
        border-radius: 16px;
        padding: 18px;
      }
      .muted{ color: #94a3b8; line-height: 1.4; }
      a{ color: #7dd3fc; }
      .title{ font-family: "Space Grotesk", Inter, system-ui; margin:0 0 8px; font-size: 18px; }
    </style>
  </head>
  <body>
    <main class="box" role="status" aria-live="polite">
      <h1 class="title">Você está offline</h1>
      <p class="muted">
        O MFX Day continua funcionando com dados locais após a primeira visita.
        Se você acabou de atualizar o app, pode ser necessário voltar a ter internet.
      </p>
      <p class="muted" style="margin-top:14px;">
        Voltar para o app:
        <a href="./#/dashboard" aria-label="Voltar para Dashboard">Dashboard</a>
      </p>
    </main>
  </body>
</html>

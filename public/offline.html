<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0ea5e9" />
    <title>Offline</title>
    <style>
      body{
        margin:0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        background:#0f172a;
        color:#e5e7eb;
        display:flex;
        min-height:100vh;
        align-items:center;
        justify-content:center;
        padding:16px;
      }
      .box{
        width:100%;
        max-width:540px;
        background: rgba(30,41,59,0.75);
        border: 1px solid rgba(148,163,184,0.18);
        border-radius: 16px;
        padding: 18px;
      }
      .muted{ color:#94a3b8; }
      a{ color: #7dd3fc; }
    </style>
  </head>
  <body>
    <main class="box" role="status" aria-live="polite">
      <h1 style="font-size:18px;margin:0 0 8px;">Sem conexão</h1>
      <p class="muted" style="margin:0 0 14px;">
        O app está funcionando offline. Se você já abriu esta página antes, seus dados continuam acessíveis.
      </p>
      <p class="muted" style="margin:0;">
        Dica: ao voltar a ter internet, atualize para receber novas versões.
      </p>
      <p class="muted" style="margin-top:14px;">Voltar: <a href="/#/dashboard">Dashboard</a></p>
    </main>
  </body>
</html>
